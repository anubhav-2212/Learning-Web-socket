<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>WebSocket server Demo</h1>
    <input type="text" placeholder="Enter your message" id="message-input">
    <button id="send-button">Send</button>
    <ul id="message-container"></ul>
</body>
<script >
    const{port}=window.location;
    const connection=new WebSocket(`ws://localhost:${port}`);
    connection.onopen=()=>{
        const messageInput=document.getElementById('message-input');
        const sendButton=document.getElementById('send-button');
        sendButton.addEventListener('click',()=>{
            const message=messageInput.value;
            connection.send(message);
            messageInput.value='';
        })
        connection.onmessage=(data)=>{
           console.log(data)
        }
        // connection.send(`Ping Hello From Browser.....`)
    }
    // connection.onmessage=(data)=>{
    //     console.log(`web socket message client `,data.data)
    // }
</script>
</html>
